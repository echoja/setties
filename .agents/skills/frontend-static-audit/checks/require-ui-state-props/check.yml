id: require-ui-state-props
purpose: Require @ui-inspectable React function components to attach uiStateProps to rendered JSX.
engine: ast-grep
language: Tsx
acceptance:
  react: "19.2"
  typescript: "7"
establishedRuleSearch:
  result: no equivalent established rule found
  checked:
    - eslint-plugin-react
    - eslint-plugin-jsx-a11y
