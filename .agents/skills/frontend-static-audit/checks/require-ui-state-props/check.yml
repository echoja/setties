limitations:
  - Other React and TypeScript versions may not work.
  - Complex component factories, class components, MDX, and hidden HOC bodies are unsupported.
  - The structural rule does not prove that every conditional return branch is instrumented.
  - An unreachable JSX expression can satisfy structural presence; component tests must cover rendered branches.
  - Runtime browser inspection must confirm that attributes reach the DOM.
